name: fwdays-ai-sre

# Note: only agentgateway runs via podman compose.
# kagent-controller is a Kubernetes controller and requires a k8s cluster.
# For full kagent deployment use: make dev-up (kind + Helm)

services:
  agentgateway:
    image: cr.agentgateway.dev/agentgateway:v1.0.0-rc.2
    container_name: agentgateway
    ports:
      - "3000:3000"    # LLM API (OpenAI-compatible)
      - "15000:15000"  # Admin UI
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ./gemini-api-key.txt:/config/gemini-api-key.txt:ro
    command: ["-f", "/config/config.yaml"]
    restart: unless-stopped
    healthcheck:
      disable: true

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"   # Web UI
      - "4317:4317"   # OpenTelemetry gRPC
      - "4318:4318"   # OpenTelemetry HTTP
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage: {}
