# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config:
  adminAddr: "0.0.0.0:15000"
binds:
  - port: 3000
    listeners:
      - routes:
          - policies:
              cors:
                allowOrigins:
                  - "*"
                allowHeaders:
                  - content-type
                  - authorization
                exposeHeaders:
                  - "*"
            backends:
              - ai:
                  groups:
                    # Primary: Ollama (local/LAN)
                    - providers:
                        - name: ollama
                          provider:
                            openAI:
                              model: llama3.1:8b
                          hostOverride: "192.168.0.152:11434"
                    # Fallback: Gemini
                    - providers:
                        - name: gemini
                          provider:
                            gemini:
                              model: gemini-2.0-flash-lite
                          policies:
                            backendAuth:
                              key:
                                file: /config/gemini-api-key.txt
