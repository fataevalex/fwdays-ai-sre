apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phoenix
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/Arize-ai/phoenix.git
    targetRevision: HEAD
    path: helm
    helm:
      valuesObject:
        service:
          type: ClusterIP
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: phoenix
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
