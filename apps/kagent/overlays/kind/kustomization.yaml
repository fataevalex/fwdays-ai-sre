apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# kind overlay: applies nginx ConfigMap and patches kagent-ui Deployment.
# Resources are copied locally to satisfy kustomize path security restrictions.

resources:
  - nginx-configmap.yaml

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: kagent-ui
      namespace: kagent
