apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent
    targetRevision: "0.8.0-beta6"
    helm:
      valuesObject:
        providers:
          default: openAI
          openAI:
            provider: OpenAI
            model: "llama3.1:8b"
            apiKey: "dummy"
            config:
              baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1"
        ui:
          service:
            type: ClusterIP
        agents:
          k8s-agent:
            enabled: true
          observability-agent:
            enabled: false
          kgateway-agent:
            enabled: false
          istio-agent:
            enabled: false
          promql-agent:
            enabled: false
          argo-rollouts-agent:
            enabled: false
          helm-agent:
            enabled: false
          cilium-policy-agent:
            enabled: false
          cilium-manager-agent:
            enabled: false
          cilium-debug-agent:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
