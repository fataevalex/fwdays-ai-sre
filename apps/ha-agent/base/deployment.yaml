apiVersion: apps/v1
kind: Deployment
metadata:
  name: ha-agent
  namespace: ha-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ha-agent
  template:
    metadata:
      labels:
        app: ha-agent
    spec:
      containers:
        - name: ha-agent
          image: ghcr.io/fataevalex/ha-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: HA_MCP_URL
              valueFrom:
                secretKeyRef:
                  name: ha-agent-secret
                  key: HA_MCP_URL
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ha-agent-secret
                  key: HA_TOKEN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
