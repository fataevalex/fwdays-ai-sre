apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ha-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ha-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ha-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ha-agent.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            {{- if .Values.existingSecret }}
            - name: HA_MCP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HA_MCP_URL
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: HA_TOKEN
            {{- else }}
            - name: HA_MCP_URL
              value: {{ .Values.env.haMcpUrl | quote }}
            - name: HA_TOKEN
              value: {{ .Values.env.haToken | quote }}
            {{- end }}
            - name: AGENT_URL
              value: {{ printf "https://%s" .Values.ingress.host | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
