apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ha-mcp-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/fataevalex/fwdays-ai-sre.git
    targetRevision: main
    path: apps/ha-mcp/overlays/minipc/config
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  ignoreDifferences:
    - group: kagent.dev
      kind: Agent
      jsonPointers:
        - /spec/declarative/tools
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
