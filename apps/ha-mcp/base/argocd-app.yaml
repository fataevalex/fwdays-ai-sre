apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ha-mcp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/fataevalex/fwdays-ai-sre.git
    targetRevision: main
    path: apps/ha-mcp/overlays/minipc/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: ha-mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
