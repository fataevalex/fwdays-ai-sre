apiVersion: kagent.dev/v1alpha1
kind: ToolServer
metadata:
  name: homeassistant
  namespace: kagent
spec:
  description: "Home Assistant MCP server — controls smart home devices, lights, switches and automations"
  config:
    streamableHttp:
      url: "http://192.168.0.108:8123/api/mcp"
      headersFrom:
        - name: Authorization
          valueFrom:
            type: Secret
            valueRef: ha-mcp-token
            key: authorization-header
