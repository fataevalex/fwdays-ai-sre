apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: agentgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      nodeSelector:
        node-pool: minipc
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.fataev.in.ua/realms/homelab
            - --client-id=agentgateway-admin
            - --redirect-url=https://agentgateway.local/oauth2/callback
            - --upstream=static://200
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-domain=agentgateway.local
            - --whitelist-domain=agentgateway.local
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentgateway-admin-oauth2
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentgateway-admin-oauth2
                  key: cookie-secret
          ports:
            - containerPort: 4180
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: agentgateway-system
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
