apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: agentgateway-metrics
  namespace: agentgateway-system
spec:
  mode: deployment
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: agentgateway-proxy
              scrape_interval: 15s
              static_configs:
                - targets:
                    - agentgateway-proxy.agentgateway-system.svc.cluster.local:15020
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: agentgateway_gen_ai.*
                  action: keep

    processors:
      batch:
        timeout: 10s
      resource:
        attributes:
          - key: service.name
            value: agentgateway-proxy
            action: upsert

    exporters:
      otlp/phoenix:
        endpoint: "phoenix-svc.phoenix.svc.cluster.local:4317"
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [resource, batch]
          exporters: [otlp/phoenix]
