apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agentgateway-tracing
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  frontend:
    tracing:
      protocol: GRPC
      randomSampling: "true"
      clientSampling: "true"
      backendRef:
        name: phoenix-svc
        namespace: phoenix
        port: 4317
