apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-admin-proxy-conf
  namespace: agentgateway-system
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 15001;
        location / {
          proxy_pass http://127.0.0.1:15000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }
