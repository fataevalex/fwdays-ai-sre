apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: agentgateway-proxy-params
  namespace: agentgateway-system
spec:
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://phoenix-svc.phoenix.svc.cluster.local:4317"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    - name: OTEL_SERVICE_NAME
      value: "agentgateway-proxy"
  deployment:
    spec:
      template:
        spec:
          nodeSelector:
            node-pool: minipc
          containers:
            - name: admin-proxy
              image: nginx:alpine
              ports:
                - containerPort: 15001
              volumeMounts:
                - name: admin-proxy-conf
                  mountPath: /etc/nginx/nginx.conf
                  subPath: nginx.conf
          volumes:
            - name: admin-proxy-conf
              configMap:
                name: agentgateway-admin-proxy-conf
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      group: agentgateway.dev
      kind: AgentgatewayParameters
      name: agentgateway-proxy-params
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
