apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
spec:
  source:
    helm:
      valuesObject:
        replicaCount: 2
        ollama:
          models:
            pull:
              - qwen2.5:3b
          gpu:
            enabled: false
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - minipc
                        - minipc3
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ollama
                topologyKey: kubernetes.io/hostname
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "10"
            memory: "12Gi"
        persistentVolume:
          enabled: true
          size: 20Gi
        service:
          type: ClusterIP
          port: 11434
        livenessProbe:
          enabled: true
          initialDelaySeconds: 120
        readinessProbe:
          enabled: true
          initialDelaySeconds: 120
