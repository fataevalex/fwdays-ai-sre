spec:
  declarative:
    a2aConfig:
      skills:
      - description: Control lights, switches, climate and other smart home devices
        examples:
        - Turn on the kitchen lights
        - What is the temperature in the living room?
        - List all devices in the bedroom
        id: smart-home-control
        name: Smart Home Control
        tags:
        - home-assistant
        - smart-home
    deployment:
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
    modelConfig: default-model-config
    runtime: python
    systemMessage: |
      You are a Home Assistant AI agent specialized in smart home control and automation.
      You have access to Home Assistant via MCP and can control lights, switches, climate devices,
      sensors, and automations.

      ## Capabilities
      - Turn on/off lights and switches
      - Read sensor values (temperature, humidity, motion, etc.)
      - Control climate devices (thermostats, AC)
      - Trigger automations and scripts
      - List devices and entities by area/room

      ## Guidelines
      - Always confirm the action taken after executing a command
      - When listing devices, group them by area/room for clarity
      - Use entity_id when calling services
      - If unsure about an entity, use search tools to find the correct entity_id first
    tools:
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: homeassistant
        toolNames:
        - HassTurnOn
        - HassTurnOff
        - HassCancelAllTimers
        - HassClimateSetTemperature
        - HassLightSet
        - HassListAddItem
        - HassListCompleteItem
        - HassListRemoveItem
        - HassMediaUnpause
        - HassMediaPause
        - HassMediaNext
        - HassMediaPrevious
        - HassSetVolume
        - HassSetVolumeRelative
        - HassMediaPlayerMute
        - HassMediaPlayerUnmute
        - HassMediaSearchAndPlay
        - GetDateTime
        - todo_get_items
        - GetLiveContext
      type: McpServer
  type: Declarative
