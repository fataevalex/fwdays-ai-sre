providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: "llama3.1:8b"
    apiKey: "dummy"
    config:
      baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1"

ui:
  service:
    type: NodePort
    nodePort: 30081

agents:
  k8s-agent:
    enabled: true
  observability-agent:
    enabled: false
  kgateway-agent:
    enabled: false
  istio-agent:
    enabled: false
  promql-agent:
    enabled: false
  argo-rollouts-agent:
    enabled: false
  helm-agent:
    enabled: false
  cilium-policy-agent:
    enabled: false
  cilium-manager-agent:
    enabled: false
  cilium-debug-agent:
    enabled: false
